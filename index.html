<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Late Night Chat</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #1e1e1e; color: #fff; }
    ul { list-style-type: none; padding: 0; margin-bottom: 60px; }
    li { padding: 10px; margin-bottom: 8px; background: #333; border-radius: 8px; width: fit-content; }
    form { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px; background: #222; box-sizing: border-box; }
    input { flex-grow: 1; padding: 12px; border: none; border-radius: 5px; margin-right: 10px; }
    button { padding: 12px 20px; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <h2> Live Chat Room (Ubuntu Server)</h2>
  <ul id="messages"></ul>
  
  <form id="form" action="">
    <input id="input" autocomplete="off" placeholder="Type a message..." required />
    <button>Send</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    var socket = io();
    var messages = document.getElementById('messages');
    var form = document.getElementById('form');
    var input = document.getElementById('input');

    // Emit message when the form is submitted
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      if (input.value) {
        socket.emit('chat message', input.value);
        input.value = '';
      }
    });

    // Append new message to the list when received from the server
    socket.on('chat message', function(msg) {
      var item = document.createElement('li');
      item.textContent = msg;
      messages.appendChild(item);
      window.scrollTo(0, document.body.scrollHeight);
    });
  </script>
</body>
</html>
